spring.application.name=shop
spring.profiles.active=dev

# Internationalization
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# Custom application settings
app.settings.application-title=Shop API
app.settings.pagination-limit=20
app.settings.contact-email=support@shop.com
app.settings.external-service-url=https://api.example.com

# Swagger / Springdoc
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.packages-to-scan=com.shop.controller
spring.jackson.serialization.write-dates-as-timestamps=false
