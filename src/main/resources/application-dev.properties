# Development profile — in-memory H2 with sample data

spring.datasource.url=jdbc:h2:mem:shopdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.settings.application-title=Shop API (Development)
app.settings.pagination-limit=50
app.settings.contact-email=dev@shop.local
app.settings.external-service-url=http://localhost:8080
