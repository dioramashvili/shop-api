# Production profile — persistent PostgreSQL with strict settings

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/shopdb}
spring.datasource.username=${DATABASE_USER:shop}
spring.datasource.password=${DATABASE_PASSWORD:shop}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.h2.console.enabled=false

app.settings.application-title=Shop API
app.settings.pagination-limit=20
app.settings.contact-email=support@shop.com
app.settings.external-service-url=${EXTERNAL_SERVICE_URL:https://api.shop.com}
